spring:
  application:
    name: pension-benefit-microservice-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/pension_db
    username: pension_user
    password: pension_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages schema; JPA validates only
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
    pool:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: 8080

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
